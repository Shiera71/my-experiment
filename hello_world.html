<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学実験室</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-center items-center p-6 font-sans">

    <!-- メインコンテンツカード -->
    <div class="text-center max-w-xl w-full bg-white p-10 rounded-2xl shadow-sm border border-gray-200">
        <!-- 大きな文字のタイトル -->
        <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-8 tracking-tight">
            心理学実験室へようこそ
        </h1>
        
        <!-- 実験を開始するボタン -->
        <button 
            id="start-btn"
            class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-medium px-8 py-3.5 rounded-lg shadow-md hover:shadow-lg transition-all duration-200 ease-in-out transform hover:-translate-y-0.5 active:translate-y-0 text-lg cursor-pointer"
        >
            実験を開始する
        </button>
    </div>

    <!-- カスタムメッセージボックス (モーダル) -->
    <div 
        id="modal-overlay" 
        class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 z-50"
    >
        <div 
            id="modal-content"
            class="bg-white rounded-xl shadow-xl max-w-sm w-full mx-4 p-6 text-center transform scale-95 opacity-0 transition-all duration-300"
        >
            <!-- メッセージボックスのヘッダー -->
            <div class="flex justify-center mb-4">
                <div class="bg-blue-50 text-blue-600 p-3 rounded-full">
                    <!-- インフォメーションアイコン (SVG) -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
            </div>
            
            <!-- メッセージ内容 -->
            <h2 class="text-xl font-semibold text-gray-800 mb-2">通知</h2>
            <p class="text-gray-600 mb-6 text-lg">Hello World!</p>
            
            <!-- 閉じるボタン -->
            <button 
                id="close-btn"
                class="w-full bg-gray-800 hover:bg-gray-900 text-white font-medium py-2.5 px-4 rounded-lg transition-colors duration-200 cursor-pointer"
            >
                閉じる
            </button>
        </div>
    </div>

    <script>
        // DOM要素の取得
        const startBtn = document.getElementById('start-btn');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalContent = document.getElementById('modal-content');
        const closeBtn = document.getElementById('close-btn');

        // モーダルを開く関数
        function openModal() {
            modalOverlay.classList.remove('opacity-0', 'pointer-events-none');
            // わずかな遅延を入れることで、CSSトランジションを有効にする
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
            }, 10);
        }

        // モーダルを閉じる関数
        function closeModal() {
            modalContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modalOverlay.classList.add('opacity-0', 'pointer-events-none');
            }, 300); // トランジション時間に合わせる
        }

        // イベントリスナーの追加
        startBtn.addEventListener('click', openModal);
        closeBtn.addEventListener('click', closeModal);

        // モーダルの背景クリックでも閉じるようにする
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                closeModal();
            }
        });
    </script>
</body>
</html>
