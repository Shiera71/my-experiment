<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ミュラー・リヤー錯視実験</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-canvas-slider-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css">
    <style>
        body { 
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background-color: #f8f9fa; 
            margin: 0;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .jspsych-content { 
            max-width: 600px; 
            width: 100%; 
            line-height: 1.6;
            font-size: 1.2rem;
            color: #333;
        }
        .jspsych-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            background-color: #007bff;
            color: white;
            border: none;
            margin-top: 20px;
            cursor: pointer;
        }
        .trial-counter {
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        input[type=range] {
            width: 80%;
            max-width: 400px;
            height: 40px;
        }
    </style>
</head>
<body>
    <script>
        // データ送信先のGASのURL
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzN66oybgeBB7gY7xoyVFE1-BbS18HgzwR7MtEOYx38-0zlHXdAApKwGrbtkdZBdTTizA/exec';

        const jsPsych = initJsPsych({
            on_finish: function() {
                const display = jsPsych.getDisplayElement();
                display.innerHTML = '<p>データを送信中です...</p>';
                const allData = jsPsych.data.get().filter({trial_type: 'canvas-slider-response'});
                const subjectId = jsPsych.data.get().values()[0].response.student_id;
                const exportData = allData.values().map(d => ({
                    subject_id: subjectId,
                    timestamp: d.time_end,
                    angle: d.angle,
                    wing_length: d.finLength,
                    pse: d.adjustment,
                    error_amount: d.adjustment - 200
                }));
                fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(exportData)
                }).then(() => {
                    display.innerHTML = '<h1>ありがとうございました</h1><p>これで実験はすべて終了です。</p>';
                });
            }
        });

        // 実験条件の設定
        const angles = [15, 75];
        const finLengths = [20, 50];
        const trials = [];
        for (let i = 0; i < 3; i++) {
            angles.forEach(a => {
                finLengths.forEach(f => {
                    trials.push({ angle: a, finLength: f });
                });
            });
        }
        const shuffledTrials = jsPsych.randomization.shuffle(trials);

        // 学籍番号の入力
        const id_input = {
            type: jsPsychSurveyText,
            questions: [{ prompt: "学籍番号を入力してください", name: 'student_id', required: true }],
            button_label: '開始する'
        };

        // 実験説明画面
        const welcome = {
            type: jsPsychHtmlButtonResponse,
            stimulus: `
                <h1>実験の始め方</h1>
                <p>ご協力ありがとうございます。これから短い視覚のテストを行います。</p>
                <p>画面に２つの「矢印のような図形」が上下に並んで表示されます。下の図形は、スライダーを動かすと長さが変わります。</p>
                <p>スライダーを左右に動かして、<strong>「上の横線」と「下の横線」がピッタリ同じ長さ</strong>に見えるところで、「決定」ボタンを押してください。</p>
            `,
            choices: ['実験を始める']
        };

        // 実験試行のタイムライン
        const experimentTimeline = shuffledTrials.map((trial, index) => {
            const initialValue = Math.floor(Math.random() * 201) + 100; // 100から300のランダム値
            return {
                type: jsPsychCanvasSliderResponse,
                prompt: `<div class="trial-counter">現在 ${index + 1} 回目 / 全 12 回</div>`,
                slider_width: 400,
                min: 50,
                max: 350,
                start: initialValue,
                button_label: '決定',
                canvas_size: [400, 600], // [高さ, 幅]
                stimulus: function(c) {
                    const ctx = c.getContext('2d');
                    
                    // 表示されているスライダー（HTMLのinput要素）を直接取得
                    const slider = document.querySelector('input[type="range"]') || (c.parentElement ? c.parentElement.querySelector('input[type="range"]') : null);
                    
                    // スライダーの値に応じて図形を再描画する関数
                    function draw(val) {
                        const centerX = 300; // キャンバスの中央（幅600の半分）
                        ctx.clearRect(0, 0, 600, 400); // キャンバスを一度クリアにする
                        ctx.lineWidth = 2;
                        
                        // 上の図形（基準刺激：内向きの羽 = 長さ200px固定）
                        drawMullerLyer(ctx, centerX, 100, 200, trial.angle, trial.finLength, true);
                        
                        // 下の図形（比較刺激：外向きの羽 = スライダーの値 val で長さがリアルタイム変化）
                        drawMullerLyer(ctx, centerX, 300, val, trial.angle, trial.finLength, false);
                    }
                    
                    // 1. 初回の描画（初期位置で表示）
                    draw(initialValue);
                    
                    // 2. スライダーが動いた（ドラッグ中）時に、リアルタイムで再描画するイベントを登録
                    if (slider) {
                        slider.addEventListener('input', function() {
                            draw(parseInt(slider.value));
                        });
                    }
                },
                on_finish: function(data) {
                    data.adjustment = parseInt(data.response);
                    data.angle = trial.angle;
                    data.finLength = trial.finLength;
                }
            };
        });

        // ミュラー・リヤー錯視図形の描画関数
        function drawMullerLyer(ctx, x, y, length, angleDeg, finLen, isInward) {
            const angleRad = (angleDeg * Math.PI) / 180;
            const halfLen = length / 2;
            
            // 主線の描画
            ctx.beginPath();
            ctx.moveTo(x - halfLen, y);
            ctx.lineTo(x + halfLen, y);
            ctx.stroke();
            
            // 羽（矢羽）の描画
            const ends = [x - halfLen, x + halfLen];
            ends.forEach(ex => {
                const direction = (ex === x - halfLen) ? 1 : -1;
                const sign = isInward ? -1 : 1;
                const deltaX = finLen * Math.cos(angleRad) * direction * sign;
                const deltaY = finLen * Math.sin(angleRad);
                
                ctx.beginPath();
                ctx.moveTo(ex, y);
                ctx.lineTo(ex + deltaX, y - deltaY);
                ctx.moveTo(ex, y);
                ctx.lineTo(ex + deltaX, y + deltaY);
                ctx.stroke();
            });
        }

        // 実験の実行
        jsPsych.run([id_input, welcome, ...experimentTimeline]);
    </script>
</body>
</html>
