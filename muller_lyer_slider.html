<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ミュラー・リヤー錯視実験</title>
    <!-- jsPsych v7.3.4 -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-canvas-slider-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f0f0f0; }
        .jspsych-content-wrapper { display: flex; align-items: center; justify-content: center; }
        .jspsych-content { width: 100%; max-width: 800px; }
    </style>
</head>
<body>
    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzN66oybgeBB7gY7xoyVFE1-BbS18HgzwR7MtEOYx38-0zlHXdAApKwGrbtkdZBdTTizA/exec';

        const jsPsych = initJsPsych({
            on_finish: function() {
                const display = jsPsych.getDisplayElement();
                display.innerHTML = '<p>データを送信中です...</p>';

                const allData = jsPsych.data.get().filter({trial_type: 'canvas-slider-response'});
                const subjectId = jsPsych.data.get().values()[0].response.student_id;
                
                const exportData = allData.values().map(d => ({
                    subject_id: subjectId,
                    timestamp: d.time_end,
                    angle: d.angle,
                    wing_length: d.finLength,
                    pse: d.adjustment,
                    error_amount: d.adjustment - 200
                }));

                fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(exportData)
                }).then(() => {
                    display.innerHTML = '<h1>実験終了</h1><p>実験終了。ご協力ありがとうございました。</p>';
                });
            }
        });

        const angles = [15, 75];
        const finLengths = [20, 50];
        const trials = [];

        for (let i = 0; i < 3; i++) {
            angles.forEach(a => {
                finLengths.forEach(f => {
                    trials.push({ angle: a, finLength: f });
                });
            });
        }
        const shuffledTrials = jsPsych.randomization.shuffle(trials);

        const id_input = {
            type: jsPsychSurveyText,
            questions: [{ prompt: "学籍番号を入力してください", name: 'student_id', required: true }],
            button_label: '開始'
        };

        const welcome = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <h1>ミュラー・リヤー錯視実験</h1>
                <div style="text-align: left; margin: 20px auto; max-width: 600px;">
                    <p><strong>実験の目的：</strong>本実験では、視覚的錯視の一つである「ミュラー・リヤー錯視」について調査します。</p>
                    <p><strong>操作方法：</strong></p>
                    <ul>
                        <li>画面上部に標準刺激、下部に比較刺激が表示されます。</li>
                        <li>下の比較刺激の長さが、上の標準刺激と同じ長さに見えるように調整してください。</li>
                        <li>調整が終わったら、画面下の「決定」ボタンを押して次の試行に進んでください。</li>
                    </ul>
                    <p>準備ができたら、何かキーを押して開始してください。</p>
                </div>
            `
        };

        const experimentTimeline = shuffledTrials.map((trial, index) => {
            const initialValue = Math.floor(Math.random() * 201) + 100;

            return {
                type: jsPsychCanvasSliderResponse,
                prompt: `<p>試行 ${index + 1} / 12</p>`,
                slider_width: 500,
                min: 50,
                max: 350,
                start: initialValue,
                require_movement: false,
                button_label: '決定',
                canvas_size: [400, 600],
                stimulus: function(c) {
                    const ctx = c.getContext('2d');
                    const slider = jsPsych.getDisplayElement().querySelector('input');
                    const sliderVal = slider ? slider.value : initialValue;
                    const centerX = 300;
                    
                    ctx.clearRect(0, 0, 600, 400);
                    ctx.lineWidth = 2;

                    drawMullerLyer(ctx, centerX, 100, 200, trial.angle, trial.finLength, true);
                    drawMullerLyer(ctx, centerX, 300, parseInt(sliderVal), trial.angle, trial.finLength, false);
                },
                on_finish: function(data) {
                    data.adjustment = parseInt(data.response);
                }
            };
        });

        function drawMullerLyer(ctx, x, y, length, angleDeg, finLen, isInward) {
            const angleRad = (angleDeg * Math.PI) / 180;
            const halfLen = length / 2;
            
            ctx.beginPath();
            ctx.moveTo(x - halfLen, y);
            ctx.lineTo(x + halfLen, y);
            ctx.stroke();

            const ends = [x - halfLen, x + halfLen];
            ends.forEach(ex => {
                const direction = (ex === x - halfLen) ? 1 : -1;
                const sign = isInward ? -1 : 1;
                const deltaX = finLen * Math.cos(angleRad) * direction * sign;
                const deltaY = finLen * Math.sin(angleRad);
                
                ctx.beginPath();
                ctx.moveTo(ex, y);
                ctx.lineTo(ex + deltaX, y - deltaY);
                ctx.moveTo(ex, y);
                ctx.lineTo(ex + deltaX, y + deltaY);
                ctx.stroke();
            });
        }

        jsPsych.run([id_input, welcome, ...experimentTimeline]);
    </script>
</body>
</html>
