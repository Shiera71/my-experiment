<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学実験室</title>
    <style>
        /* 1. 背景は薄いグレー */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0; /* 薄いグレー */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        /* 2. 画面中央に大きな文字 */
        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            font-weight: bold;
        }

        /* 3. 実験を開始する青いボタン */
        .start-button {
            background-color: #007bff; /* 青 */
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.25rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .start-button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        .start-button:active {
            transform: translateY(0);
        }

        /* アラートの代わりのメッセージボックス用スタイル */
        #custom-alert {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 1000;
            text-align: center;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .close-btn {
            margin-top: 1rem;
            background: #6c757d;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>心理学実験室へようこそ</h1>
        <button id="startBtn" class="start-button">実験を開始する</button>
    </div>

    <!-- カスタムメッセージボックス（ブラウザのalertの代わり） -->
    <div id="overlay"></div>
    <div id="custom-alert">
        <p style="font-size: 1.5rem; margin-bottom: 1rem;">Hello World!</p>
        <button class="close-btn" onclick="closeAlert()">閉じる</button>
    </div>

    <script>
        // 4. ボタンを押すとメッセージを表示する
        const startBtn = document.getElementById('startBtn');
        const customAlert = document.getElementById('custom-alert');
        const overlay = document.getElementById('overlay');

        startBtn.addEventListener('click', () => {
            // ブラウザのalert()はUXを損なうため、カスタムUIで表示します
            customAlert.style.display = 'block';
            overlay.style.display = 'block';
        });

        function closeAlert() {
            customAlert.style.display = 'none';
            overlay.style.display = 'none';
        }

        // 背景クリックでも閉じられるように設定
        overlay.addEventListener('click', closeAlert);
    </script>
</body>
</html>
